version: "3.8"

services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cybershield-scanner
    ports:
      - "8000:8080"
    volumes:
      - db-data:/code/database
    environment:
      - GOOGLE_GENAI_USE_VERTEXAI=False
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ALLOW_ORIGINS=*
    restart: always

volumes:
  db-data:
    driver: local
